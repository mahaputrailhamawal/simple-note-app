name: On-Demand Secret Scanner

# Method 2: This creates the manual "Run workflow" button in the GitHub UI
on:
  workflow_dispatch: 

jobs:
  secret-scanning:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          # fetch-depth: 0 is CRITICAL for secret scanners to check Git history
          fetch-depth: 0 

      - name: TruffleHog (Verified Secrets)
        uses: trufflesecurity/trufflehog@main
        continue-on-error: true
        with:
          path: ./
          extra_args: --only-verified

      - name: Gitleaks (Generic Secrets & Passwords)
        uses: gitleaks/gitleaks-action@v2
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
