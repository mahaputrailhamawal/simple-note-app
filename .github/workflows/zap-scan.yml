name: OWASP ZAP DAST Scan

on:
  workflow_dispatch:

jobs:
  zap_scan:
    name: ZAP DAST Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup workspace permissions
        run: |
          chmod 777 ${{ github.workspace }}
          touch ${{ github.workspace }}/report_html.html
          touch ${{ github.workspace }}/report_json.json
          touch ${{ github.workspace }}/report_md.md
          chmod 777 ${{ github.workspace }}/report_html.html
          chmod 777 ${{ github.workspace }}/report_json.json
          chmod 777 ${{ github.workspace }}/report_md.md

      - name: Pull ZAP Docker image
        run: docker pull ghcr.io/zaproxy/zaproxy:stable

      # -I flag = do not fail even when warnings are found
      - name: Run ZAP Baseline Scan
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/zap/wrk:rw \
            --network host \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t ${{ secrets.TARGET_URL }} \
            -J report_json.json \
            -w report_md.md \
            -r report_html.html \
            -I
        continue-on-error: true

      - name: Verify report files
        if: always()
        run: |
          echo "=== Workspace contents ==="
          ls -la ${{ github.workspace }}/
          echo "=== Find report files ==="
          find ${{ github.workspace }} -name "report*" 2>/dev/null

      - name: Upload ZAP Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-report-${{ github.run_id }}
          path: |
            ${{ github.workspace }}/report_html.html
            ${{ github.workspace }}/report_json.json
            ${{ github.workspace }}/report_md.md
          if-no-files-found: warn
