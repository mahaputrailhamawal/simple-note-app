name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened] # Good practice to scan PRs before merging

jobs:
  sonarqube:
    name: Build and Analyze
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Shallow clones disable cross-file taint analysis
          
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@v4.0.0 # I recommend using v4+ or the v6 you had earlier
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      # If you wish to fail your job when the Quality Gate is red, uncomment the
      # following lines. This would typically be used to fail a deployment.
      # - uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
      #   timeout-minutes: 5
      #   env:
      #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
